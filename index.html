        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error("Global Error:", msg, "at", url, ":", lineNo);
            const root = document.getElementById('root');
            if (root && (root.innerHTML.includes('LOADING RITUAL') || root.innerHTML === '')) {
                root.innerHTML = `
                    <div style="color: white; padding: 20px; font-family: sans-serif; text-align: center; background: black; height: 100vh;">
                        <h1 style="color: red;">Critical Error</h1>
                        <p>The game failed to start. This might be due to a script loading error or a syntax issue.</p>
                        <div style="text-align: left; background: #222; padding: 10px; overflow: auto; max-height: 300px; font-size: 12px; color: #aaa;">
                            ${msg}<br>at ${url}:${lineNo}:${columnNo}
                        </div>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #444; color: white; border: none; cursor: pointer;">Reload Page</button>
                    </div>
                `;
            }
            return false;
        };

            const chat = useRef({ x: 2, y: 2 });
            const keysPressed = useRef({});

            useEffect(() => {
                const handleResize = () => {
                    setCanvasSize({ width: window.innerWidth, height: window.innerHeight });
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const getRandomWalkablePosition = (map, playerX = 12, playerY = 12, minDistance = 10) => {
                let x, y, dist;
                let attempts = 0;
                do {
                    x = Math.floor(Math.random() * (MAP_SIZE - 2)) + 1;
                    y = Math.floor(Math.random() * (MAP_SIZE - 2)) + 1;
                    dist = Math.sqrt((x - playerX)**2 + (y - playerY)**2);
                    attempts++;
                } while ((map[y][x] !== 0 || dist < minDistance) && attempts < 100);
                return { x, y };
            };

            const startGame = (startLevel = 1) => {
                const config = LEVELS[startLevel];
                setGameState('PLAYING');
                setLevel(startLevel);
                setBattery(100);
                setFlashlightOn(true);
                const newMap = config.map.map(row => [...row]);
                setWorldMap(newMap);
                setTasks(config.tasks.map(t => ({ ...t, completed: false })));
                player.current = { x: 12, y: 12, dir: 0 };
                chat.current = getRandomWalkablePosition(newMap, 12, 12, 10);
                setSpawnGracePeriod(180); // 3 seconds at ~60fps
                setChatMessages([{ id: Date.now(), user: 'System', text: `Level ${startLevel} Ritual Initiated. Prepare yourself.`, type: 'system' }]);

                if (LEVELS[level + 1]) {

                const checkDist = 1.2;
                const testX = Math.floor(player.current.x + Math.cos(player.current.dir) * checkDist);
                const testY = Math.floor(player.current.y + Math.sin(player.current.dir) * checkDist);

                if (testX >= 0 && testX < MAP_SIZE && testY >= 0 && testY < MAP_SIZE) {
                    setWorldMap(prev => {
                        const tile = prev[testY][testX];
                        if (tile === 4 || tile === 5) {
                            const newMap = [...prev];
                            newMap[testY] = [...prev[testY]];
                            newMap[testY][testX] = tile === 4 ? 5 : 4;
                            return newMap;
                        }
                        return prev;
                    });
                }
            }, []);

            const handleKeyDown = useCallback((e) => {
                const key = e.key.toLowerCase();
                keysPressed.current[key] = true;
                if (key === 'e' && gameState === 'PLAYING') handleInteraction();
                if (key === 'f' && gameState === 'PLAYING') setFlashlightOn(prev => !prev);
            }, [gameState, handleInteraction]);

            const handleKeyUp = useCallback((e) => {
                keysPressed.current[e.key.toLowerCase()] = false;
            }, []);

            const handleMouseMove = useCallback((e) => {
                if (document.pointerLockElement === canvasRef.current) {
                    player.current.dir += e.movementX * MOUSE_SENSITIVITY;
                }
            }, []);

            const requestLock = () => {
                canvasRef.current?.requestPointerLock();
            };

            useEffect(() => {
                const lockChange = () => {
                    setIsLocked(document.pointerLockElement === canvasRef.current);
                };
                document.addEventListener('pointerlockchange', lockChange);
                return () => document.removeEventListener('pointerlockchange', lockChange);
            }, []);

            const batteryRef = useRef(battery);
            const tasksRef = useRef(tasks);

            useEffect(() => { batteryRef.current = battery; }, [battery]);
            useEffect(() => { tasksRef.current = tasks; }, [tasks]);

            // Separate effect for chat messages to avoid interval reset on every frame
            useEffect(() => {
                if (gameState !== 'PLAYING') return;
                console.log("Chat interval started");

                const scaryUsers = ['X_Void_X', 'StaticWatcher', 'User_666', 'The_Eye', 'Glitch_Boi', 'Not_Joe', 'Behind_You', 'Lurker', 'Red_Static'];
                const genericMessages = [
                    "I see you.",
                    "Don't look back.",
                    "The battery is dying.",
                    "Joe is hungry.",
                    "Why are you still here?",
                    "It's cold in there.",
                    "Look at the camera.",
                    "We are watching.",
                    "Finish the ritual.",
                    "He's right behind the shelf.",
                    "I can hear your breathing.",
                    "The static is calling.",
                    "Don't let the light die.",
                    "Is that a shadow?",
                    "Run.",
                    "Too slow.",
                    "We love the content.",
                    "More blood.",
                    "The ritual requires more."
                ];

                const chatInterval = setInterval(() => {
                    const config = LEVELS[level];
                    if (Math.random() < config.chatSpeed * 15) {
                        const user = scaryUsers[Math.floor(Math.random() * scaryUsers.length)];
                        let text = genericMessages[Math.floor(Math.random() * genericMessages.length)];
                        
                        // Contextual messages using refs
                        if (batteryRef.current < 20) text = "THE LIGHT IS FADING. GOOD.";
                        if (tasksRef.current.filter(t => t.completed).length === tasksRef.current.length - 1) text = "ALMOST DONE. BUT NOT QUITE.";

                        setChatMessages(prev => {
                            const newMessage = {
                                id: Date.now(),
                                user,
                                text,
                                type: Math.random() > 0.8 ? 'glitch' : 'normal'
                            };
                            return [...prev.slice(-8), newMessage];
                        });
                    }
                }, 1000);

                return () => clearInterval(chatInterval);
            }, [gameState, level]);

            useEffect(() => {
                if (gameState !== 'PLAYING') return;
                
                const glitchTimer = setInterval(() => {
                    if (Math.random() > 0.95) {
                        setGlitchActive(true);
                        setTimeout(() => setGlitchActive(false), 100 + Math.random() * 200);
                    }
                    // Fluctuating viewers
                    setViewers(prev => Math.max(1, prev + Math.floor(Math.random() * 21) - 10));
                }, 2000);
                
                return () => clearInterval(glitchTimer);
            }, [gameState]);

            const update = useCallback(() => {
                if (gameState !== 'PLAYING') return;

                const moveX = Math.cos(player.current.dir) * PLAYER_SPEED;
                const moveY = Math.sin(player.current.dir) * PLAYER_SPEED;
                const strafeX = Math.cos(player.current.dir + Math.PI / 2) * PLAYER_SPEED;
                const strafeY = Math.sin(player.current.dir + Math.PI / 2) * PLAYER_SPEED;

                let nextX = player.current.x;
                let nextY = player.current.y;

                if (keysPressed.current['w']) { nextX += moveX; nextY += moveY; }
                if (keysPressed.current['s']) { nextX -= moveX; nextY -= moveY; }
                if (keysPressed.current['a']) { nextX -= strafeX; nextY -= strafeY; }
                if (keysPressed.current['d']) { nextX += strafeX; nextY += strafeY; }

                const isWalkable = (x, y) => {
                    const tile = worldMap[Math.floor(y)][Math.floor(x)];
                    return tile === 0 || tile === 5;
                };

                if (isWalkable(nextX, nextY)) {
                    player.current.x = nextX;
                    player.current.y = nextY;
                } else if (isWalkable(nextX, player.current.y)) {
                    player.current.x = nextX;
                } else if (isWalkable(player.current.x, nextY)) {
                    player.current.y = nextY;
                }

                const checkDist = 1.2;
                const lookX = Math.floor(player.current.x + Math.cos(player.current.dir) * checkDist);
                const lookY = Math.floor(player.current.y + Math.sin(player.current.dir) * checkDist);
                if (lookX >= 0 && lookX < MAP_SIZE && lookY >= 0 && lookY < MAP_SIZE) {
                    const tile = worldMap[lookY][lookX];
                    if (tile === 4) setInteractionPrompt('Open Door [E]');
                    else if (tile === 5) setInteractionPrompt('Close Door [E]');
                    else setInteractionPrompt(null);
                } else {
                    setInteractionPrompt(null);
                }

                const config = LEVELS[level];
                
                if (spawnGracePeriod <= 0) {
                    const dx = player.current.x - chat.current.x;
                    const dy = player.current.y - chat.current.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 0.1) {
                        chat.current.x += (dx / dist) * config.chatSpeed;
                        chat.current.y += (dy / dist) * config.chatSpeed;
                    }

                    if (dist < 0.4) {
                        setGameState('JUMPSCARE');
                        setShowJumpscare(true);
                        if (document.pointerLockElement) document.exitPointerLock();
                        setTimeout(() => {
                            setShowJumpscare(false);
                            setGameState('GAMEOVER');
                        }, 2000);
                    }
                } else {
                    setSpawnGracePeriod(prev => prev - 1);
                }

                setTasks(prev => prev.map(t => {
                    if (!t.completed) {
                        const tdx = player.current.x - t.gridX;
                        const tdy = player.current.y - t.gridY;
                        const tdist = Math.sqrt(tdx * tdx + tdy * tdy);
                        if (tdist < 0.8) return { ...t, completed: true };
                    }
                    return t;
                }));

                if (flashlightOn && battery > 0) {
                    setBattery(prev => Math.max(0, prev - config.batteryDrain));
                }

                // Update static intensity based on chat distance
                const cdx = player.current.x - chat.current.x;
                const cdy = player.current.y - chat.current.y;
                const cdist = Math.sqrt(cdx * cdx + cdy * cdy);
                setStaticIntensity(Math.max(0, 1 - cdist / 6));

                if (tasks.every(t => t.completed)) {
                    setGameState('LEVEL_COMPLETE');
                    if (document.pointerLockElement) document.exitPointerLock();
                }
            }, [gameState, tasks, worldMap, flashlightOn, battery, level]);

            const draw = useCallback((ctx) => {
                const { width, height } = canvasSize;
                ctx.clearRect(0, 0, width, height);

                const numRays = width;
                const stepAngle = FOV / numRays;

                for (let i = 0; i < numRays; i++) {
                    const rayAngle = player.current.dir - FOV / 2 + i * stepAngle;
                    let distance = 0;
                    let hitWall = false;
                    let wallType = 0;

                    const eyeX = Math.cos(rayAngle);
                    const eyeY = Math.sin(rayAngle);

                    while (!hitWall && distance < 20) {
                        distance += 0.02;
                        const testX = Math.floor(player.current.x + eyeX * distance);
                        const testY = Math.floor(player.current.y + eyeY * distance);

                        if (testX < 0 || testX >= MAP_SIZE || testY < 0 || testY >= MAP_SIZE) {
                            hitWall = true;
                            distance = 20;
                        } else {
                            if (worldMap[testY][testX] > 0 && worldMap[testY][testX] !== 5) {
                                hitWall = true;
                                wallType = worldMap[testY][testX];
                            }
                        }
                    }

                    const correctedDistance = distance * Math.cos(rayAngle - player.current.dir);
                    const ceiling = height / 2 - height / correctedDistance;
                    const floor = height - ceiling;

                    ctx.fillStyle = (battery > 0 && flashlightOn) ? '#0a0a0a' : 'black';
                    ctx.fillRect(i, 0, 1, ceiling);

                    let baseColor = [20, 20, 20];
                    if (wallType === 1) baseColor = [80, 40, 40];
                    if (wallType === 2) baseColor = [40, 60, 80];
                    if (wallType === 3) baseColor = [60, 60, 40];
                    if (wallType === 4) baseColor = [70, 70, 70];

                    const brightness = Math.max(0, 1.2 - correctedDistance / 25);
                    const r = Math.min(255, baseColor[0] * brightness * 1.5);
                    const g = Math.min(255, baseColor[1] * brightness * 1.5);
                    const b = Math.min(255, baseColor[2] * brightness * 1.5);
                    
                    ctx.fillStyle = (battery > 0 && flashlightOn) ? `rgb(${r}, ${g}, ${b})` : 'black';
                    ctx.fillRect(i, ceiling, 1, floor - ceiling);

                    if (wallType === 3 && battery > 0) {
                        ctx.fillStyle = `rgba(0,0,0,${0.3 * brightness})`;
                        for (let j = 0; j < 4; j++) {
                            const shelfY = ceiling + (floor - ceiling) * (j / 4);
                            ctx.fillRect(i, shelfY, 1, 2);
                        }
                    }

                    const floorBrightness = Math.max(0, 1 - (correctedDistance / 15));
                    const fR = (battery > 0 && flashlightOn) ? 15 * floorBrightness : 0;
                    const fG = (battery > 0 && flashlightOn) ? 15 * floorBrightness : 0;
                    const fB = (battery > 0 && flashlightOn) ? 15 * floorBrightness : 0;
                    ctx.fillStyle = `rgb(${fR}, ${fG}, ${fB})`;
                    ctx.fillRect(i, floor, 1, height - floor);
                }

                const renderSprite = (x, y, color, size, isChat = false) => {
                    const dx = x - player.current.x;
                    const dy = y - player.current.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    let spriteAngle = Math.atan2(dy, dx) - player.current.dir;
                    if (spriteAngle < -Math.PI) spriteAngle += 2 * Math.PI;
                    if (spriteAngle > Math.PI) spriteAngle -= 2 * Math.PI;

                    if (Math.abs(spriteAngle) < FOV / 2) {
                        const screenX = (spriteAngle + FOV / 2) / FOV * width;
                        const spriteHeight = height / dist * size;
                        const spriteWidth = spriteHeight;
                        
                        if (battery > 0 && flashlightOn) {
                            const brightness = Math.max(0, 1.2 - dist / 20);
                            ctx.globalAlpha = Math.min(1, brightness * 1.5);
                            ctx.fillStyle = color;
                            ctx.fillRect(screenX - spriteWidth / 2, height / 2 - spriteHeight / 2, spriteWidth, spriteHeight);
                            
                            if (isChat) {
                                const xPos = screenX - spriteWidth / 2;
                                const yPos = height / 2 - spriteHeight / 2;

                                // Shifting static body
                                ctx.fillStyle = `rgba(${150 + Math.random() * 105}, 0, 0, ${0.4 + Math.random() * 0.4})`;
                                ctx.fillRect(xPos, yPos, spriteWidth, spriteHeight);
                                
                                // Glitchy static particles
                                for(let j=0; j<15; j++) {
                                    ctx.fillStyle = Math.random() > 0.5 ? '#ff0000' : '#000000';
                                    ctx.fillRect(
                                        xPos + Math.random() * spriteWidth,
                                        yPos + Math.random() * spriteHeight,
                                        Math.random() * 4,
                                        Math.random() * 4
                                    );
                                }
                            }
                            ctx.globalAlpha = 1;
                        }

                        // Eyes and whispers are visible even in dark if close enough
                        if (isChat) {
                            const time = Date.now() / 1000;
                            const xPos = screenX - spriteWidth / 2;
                            const yPos = height / 2 - spriteHeight / 2;
                            const glowAlpha = Math.max(0, 1 - dist / 12);

                            if (glowAlpha > 0) {
                                ctx.save();
                                ctx.globalAlpha = glowAlpha;
                                
                                // Many random eyes
                                const eyeCount = 8 + Math.floor(Math.sin(time * 2) * 4 + 4);
                                for (let j = 0; j < eyeCount; j++) {
                                    const offsetX = (Math.sin(time * (j + 1)) * 0.4) * spriteWidth;
                                    const offsetY = (Math.cos(time * (j + 1.5)) * 0.4) * spriteHeight;
                                    const eyeSize = (0.05 + Math.random() * 0.1) * spriteWidth;
                                    
                                    // Pulsing glow
                                    const pulse = 0.8 + Math.sin(time * 5 + j) * 0.2;
                                    
                                    ctx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
                                    ctx.beginPath();
                                    ctx.ellipse(screenX + offsetX, height/2 + offsetY, eyeSize, eyeSize * 0.6, 0, 0, Math.PI * 2);
                                    ctx.fill();
                                    
                                    ctx.fillStyle = `rgba(255, 0, 0, ${pulse})`;
                                    ctx.beginPath();
                                    ctx.arc(screenX + offsetX + (Math.random()-0.5)*2, height/2 + offsetY + (Math.random()-0.5)*2, eyeSize * 0.4, 0, Math.PI * 2);
                                    ctx.fill();
                                }

                                // Floating whispers
                                if (dist < 4) {
                                    const whispers = ["WATCHING", "HUNGRY", "JOE", "VOID", "DIE", "STAY"];
                                    ctx.font = 'bold 12px monospace';
                                    ctx.fillStyle = 'rgba(255, 0, 0, 1)';
                                    const whisper = whispers[Math.floor(time % whispers.length)];
                                    ctx.fillText(whisper, xPos + Math.sin(time*10)*10, yPos - 10 + Math.cos(time*5)*5);
                                }

                                // Occasional big red flash (only if flashlight is on for extra effect)
                                if (Math.random() > 0.98 && (battery > 0 && flashlightOn)) {
                                    ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                                    ctx.fillRect(xPos - spriteWidth/2, yPos - spriteHeight/2, spriteWidth * 2, spriteHeight * 2);
                                }
                                ctx.restore();
                            }
                        }
                    }
                };

                tasks.forEach(t => {
                    if (!t.completed) renderSprite(t.gridX + 0.5, t.gridY + 0.5, '#facc15', 0.3);
                });
                renderSprite(chat.current.x, chat.current.y, '#ef4444', 0.8, true);

                // Draw static noise as overlay
                if (staticIntensity > 0.1) {
                    ctx.save();
                    ctx.globalAlpha = staticIntensity * 0.4;
                    for (let i = 0; i < 500; i++) {
                        const x = Math.random() * width;
                        const y = Math.random() * height;
                        const s = Math.random() * 2;
                        ctx.fillStyle = Math.random() > 0.5 ? 'white' : 'black';
                        ctx.fillRect(x, y, s, s);
                    }
                    ctx.restore();
                }

            }, [tasks, battery, worldMap, flashlightOn, canvasSize, staticIntensity]);

            useEffect(() => {
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                window.addEventListener('mousemove', handleMouseMove);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                    window.removeEventListener('mousemove', handleMouseMove);
                };
            }, [handleKeyDown, handleKeyUp, handleMouseMove]);

            useEffect(() => {
                const loop = () => {
                    const canvas = canvasRef.current;
                    if (canvas) {
                        const ctx = canvas.getContext('2d');
                        if (ctx) {
                            update();
                            draw(ctx);
                        }
                    }
                    requestRef.current = requestAnimationFrame(loop);
                };
                if (gameState === 'PLAYING') requestRef.current = requestAnimationFrame(loop);
                return () => { if (requestRef.current) cancelAnimationFrame(requestRef.current); };
            }, [gameState, update, draw]);

            return (
                <div className="min-h-screen bg-black text-white font-sans flex flex-col items-center justify-center overflow-hidden">
                    <div className="absolute top-4 left-4 right-4 flex justify-between items-start pointer-events-none z-10">
                        <div className="flex flex-col gap-2">
                            <div className="flex items-center gap-2 bg-zinc-900/80 p-2 rounded-lg border border-zinc-800">
                                <div className="flex items-center gap-2 mr-4">
                                    <span className="text-xs font-black text-red-500">LVL {level}</span>
                                </div>
                                <Flashlight className={`w-5 h-5 ${flashlightOn && battery > 0 ? 'text-yellow-400' : 'text-zinc-600'}`} />
                                <Battery className={`w-5 h-5 ${battery < 20 ? 'text-red-500 animate-pulse' : 'text-emerald-500'}`} />
                                <div className="w-32 h-2 bg-zinc-800 rounded-full overflow-hidden">
                                    <motion.div 
                                        className="h-full bg-emerald-500"
                                        initial={{ width: '100%' }}
                                        animate={{ width: `${battery}%` }}
                                        transition={{ duration: 0.1 }}
                                    />
                                </div>
                            </div>
                            <div className="bg-zinc-900/80 p-3 rounded-lg border border-zinc-800">
                                <div className="flex items-center gap-2 mb-2 text-zinc-400 text-xs uppercase tracking-widest font-bold">
                                    <ClipboardList className="w-4 h-4" />
                                    Rituals
                                </div>
                                <ul className="space-y-1">
                                    {tasks.map(t => (
                                        <li key={t.id} className={`text-sm flex items-center gap-2 ${t.completed ? 'text-zinc-600 line-through' : 'text-zinc-200'}`}>
                                            <div className={`w-2 h-2 rounded-full ${t.completed ? 'bg-zinc-600' : 'bg-yellow-500 animate-pulse'}`} />
                                            {t.label}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                        <div className="flex flex-col items-end gap-2">
                            <div className="bg-zinc-900/80 p-2 rounded-lg border border-zinc-800 flex items-center gap-2">
                                <AlertTriangle className="w-5 h-5 text-red-500 animate-bounce" />
                                <span className="text-red-500 font-mono text-sm uppercase">Chat is watching</span>
                            </div>
                            
                            {/* Chat Messages UI */}
                            <motion.div 
                                animate={glitchActive ? { x: [0, -2, 2, 0], filter: ['hue-rotate(0deg)', 'hue-rotate(90deg)', 'hue-rotate(0deg)'] } : {}}
                                className="w-64 max-h-64 bg-black/80 rounded-lg border border-red-900/30 flex flex-col overflow-hidden backdrop-blur-md shadow-[0_0_15px_rgba(255,0,0,0.1)]"
                            >
                                <div className="bg-red-950/40 px-3 py-1 border-b border-red-900/30 flex justify-between items-center">
                                    <span className="text-[10px] font-black text-red-500 uppercase tracking-tighter animate-pulse">LIVE CHAT</span>
                                    <div className="flex items-center gap-1">
                                        <div className="w-1.5 h-1.5 bg-red-600 rounded-full animate-pulse" />
                                        <span className="text-[10px] text-zinc-400 font-mono uppercase tracking-tighter">{viewers} VIEWERS</span>
                                    </div>
                                </div>
                                <div className="p-2 space-y-2 overflow-y-auto font-mono text-[11px] scrollbar-hide">
                                    {chatMessages.map(msg => (
                                        <motion.div 
                                            key={msg.id} 
                                            initial={{ opacity: 0, x: 20 }} 
                                            animate={{ opacity: 1, x: 0 }}
                                            className={`flex flex-col border-l-2 ${msg.type === 'system' ? 'border-zinc-800 pl-2' : 'border-red-900/50 pl-2'} ${msg.type === 'glitch' ? 'animate-pulse' : ''}`}
                                        >
                                            <span className={`font-black text-[9px] uppercase tracking-widest ${msg.type === 'system' ? 'text-zinc-500' : 'text-red-500'}`}>
                                                {msg.user}
                                            </span>
                                            <span className={`${msg.type === 'glitch' ? 'text-red-600 font-black italic' : 'text-zinc-300'}`}>
                                                {msg.text}
                                            </span>
                                        </motion.div>
                                    ))}
                                </div>
                            </motion.div>
                        </div>
                    </div>

                    <div ref={containerRef} className="relative w-full h-screen overflow-hidden">
                        <motion.div
                            animate={gameState === 'JUMPSCARE' ? {
                                x: [0, -5, 5, -5, 5, 0],
                                y: [0, 5, -5, 5, -5, 0],
                            } : {
                                x: 0,
                                y: 0,
                            }}
                            transition={gameState === 'JUMPSCARE' ? { 
                                repeat: Infinity, 
                                duration: 0.2 
                            } : { 
                                duration: 0.5 
                            }}
                            className="w-full h-full"
                        >
                            <canvas 
                                ref={canvasRef}
                                width={canvasSize.width}
                                height={canvasSize.height}
                                className="bg-zinc-950 cursor-crosshair block w-full h-full"
                                onClick={gameState === 'PLAYING' ? requestLock : undefined}
                            />
                        </motion.div>

                        {gameState === 'PLAYING' && interactionPrompt && (
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 translate-y-8 pointer-events-none">
                                <div className="bg-black/80 px-4 py-2 rounded border border-zinc-700 text-xs font-bold uppercase tracking-widest text-white">
                                    {interactionPrompt}
                                </div>
                            </div>
                        )}
                        
                        {gameState === 'PLAYING' && !isLocked && (
                            <div className="absolute inset-0 flex items-center justify-center bg-black/40 pointer-events-none">
                                <div className="bg-zinc-900 p-4 rounded-lg border border-zinc-700 flex items-center gap-3 animate-pulse">
                                    <MousePointer2 className="w-6 h-6 text-red-500" />
                                    <span className="text-sm font-bold uppercase tracking-widest">Click to Look & Move</span>
                                </div>
                            </div>
                        )}

                        {/* Glitch Overlay */}
                        {glitchActive && (
                            <div className="absolute inset-0 z-50 pointer-events-none bg-red-900/20 mix-blend-overlay flex items-center justify-center">
                                <div className="w-full h-1 bg-red-600/50 absolute top-1/4 animate-pulse" />
                                <div className="w-full h-1 bg-red-600/50 absolute top-3/4 animate-pulse" />
                                {Math.random() > 0.5 && (
                                    <div className="text-red-600 font-mono text-9xl opacity-20 select-none">WATCHING</div>
                                )}
                            </div>
                        )}

                        <AnimatePresence>
                            {gameState === 'START' && (
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                    className="absolute inset-0 bg-black/90 flex flex-col items-center justify-center text-center p-8 z-30"
                                >
                                    <motion.h1 
                                        className="text-7xl md:text-9xl font-black mb-4 tracking-tighter text-red-600 uppercase italic"
                                        animate={{ scale: [1, 1.02, 1], rotate: [-1, 1, -1] }}
                                        transition={{ repeat: Infinity, duration: 4 }}
                                    >
                                        Joe the Game
                                    </motion.h1>
                                    <p className="text-zinc-500 max-w-md mb-8 italic">"The night shift never ends. The viewers never leave."</p>
                                    <div className="flex gap-4">
                                        <button onClick={() => setGameState('LORE')} className="px-8 py-4 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-full transition-all flex items-center gap-2"><BookOpen className="w-5 h-5" />READ LORE</button>
                                        <button onClick={() => startGame(1)} className="px-8 py-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-full transition-all flex items-center gap-2"><Play className="w-5 h-5" />START SHIFT</button>
                                    </div>
                                </motion.div>
                            )}

                            {gameState === 'LORE' && (
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                    className="absolute inset-0 bg-zinc-950 flex flex-col items-center justify-center text-center p-12 z-30"
                                >
                                    <div className="max-w-xl">
                                        <motion.p key={loreIndex} initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="text-2xl font-serif italic text-zinc-300 mb-12 leading-relaxed">"{LORE_TEXT[loreIndex]}"</motion.p>
                                        <div className="flex justify-center gap-4">
                                            {loreIndex < LORE_TEXT.length - 1 ? (
                                                <button onClick={() => setLoreIndex(prev => prev + 1)} className="px-6 py-2 bg-zinc-800 rounded-full text-sm font-bold">NEXT</button>
                                            ) : (
                                                <button onClick={() => startGame(1)} className="px-8 py-4 bg-red-600 text-white font-bold rounded-full">I UNDERSTAND. START.</button>
                                            )}
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {gameState === 'LEVEL_COMPLETE' && (
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                    className="absolute inset-0 bg-black/90 flex flex-col items-center justify-center text-center p-8 z-30"
                                >
                                    <h2 className="text-4xl md:text-5xl font-black mb-4 text-emerald-500 uppercase italic">Ritual Complete</h2>
                                    <p className="text-zinc-400 mb-8">Level {level} finished. The tether holds... for now.</p>
                                    <button onClick={nextLevel} className="px-12 py-6 bg-emerald-600 hover:bg-emerald-700 text-white font-black rounded-full transition-all flex items-center gap-3 text-xl"><Play className="w-6 h-6" />ENTER LEVEL {level + 1}</button>
                                </motion.div>
                            )}

                            {gameState === 'JUMPSCARE' && showJumpscare && (
                                <motion.div 
                                    initial={{ scale: 0.1, opacity: 0, rotate: 45 }} 
                                    animate={{ 
                                        scale: [1, 4, 3.8, 4.5], 
                                        opacity: [0, 1, 0.9, 1], 
                                        rotate: [45, 0, -5, 5, 0],
                                        x: [0, -10, 10, -5, 5, 0],
                                        y: [0, 10, -10, 5, -5, 0],
                                        backgroundColor: ['#450a0a', '#600a0a', '#450a0a', '#000000']
                                    }}
                                    transition={{ duration: 0.5, times: [0, 0.3, 0.7, 1], ease: "easeOut" }}
                                    className="absolute inset-0 z-50 flex flex-col items-center justify-center overflow-hidden"
                                >
                                    <div className="relative scale-150">
                                        <Skull className="w-64 h-64 text-white drop-shadow-[0_0_50px_rgba(255,0,0,0.8)]" />
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <Eye className="w-32 h-32 text-red-600 animate-ping" />
                                        </div>
                                        {/* Noise overlay */}
                                        <motion.div 
                                            animate={{ opacity: [0.1, 0.4, 0.2, 0.5] }}
                                            transition={{ repeat: Infinity, duration: 0.05 }}
                                            className="absolute inset-0 pointer-events-none mix-blend-overlay opacity-30"
                                            style={{
                                                backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")`
                                            }}
                                        />
                                        {/* Glitch lines */}
                                        <motion.div 
                                            animate={{ opacity: [0, 1, 0], x: [-200, 200] }}
                                            transition={{ repeat: Infinity, duration: 0.05 }}
                                            className="absolute top-1/4 left-0 w-full h-2 bg-white/40"
                                        />
                                        <motion.div 
                                            animate={{ opacity: [0, 1, 0], x: [200, -200] }}
                                            transition={{ repeat: Infinity, duration: 0.07 }}
                                            className="absolute top-3/4 left-0 w-full h-4 bg-red-500/40"
                                        />
                                    </div>
                                    <motion.div 
                                        animate={{ 
                                            scale: [1, 1.3, 1], 
                                            opacity: [1, 0.7, 1],
                                            skewX: [0, 20, -20, 0]
                                        }}
                                        transition={{ repeat: Infinity, duration: 0.08 }}
                                        className="mt-16 text-2xl md:text-4xl font-black text-white uppercase tracking-tighter italic drop-shadow-[0_0_20px_rgba(255,0,0,1)]"
                                    >
                                        YOU ARE CONSUMED
                                    </motion.div>
                                </motion.div>
                            )}

                            {gameState === 'GAMEOVER' && (
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                    className="absolute inset-0 bg-black/95 flex flex-col items-center justify-center text-center p-8 z-30"
                                >
                                    <h2 className="text-2xl md:text-3xl font-black mb-4 text-red-600 uppercase">Shift Terminated</h2>
                                    <p className="text-zinc-400 mb-8">You are now part of the stream. Forever.</p>
                                    <button onClick={() => startGame(1)} className="px-8 py-4 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-full transition-all flex items-center gap-2"><RefreshCw className="w-5 h-5" />RETRY RITUAL</button>
                                </motion.div>
                            )}

                            {gameState === 'WIN' && (
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                    className="absolute inset-0 bg-emerald-950/90 flex flex-col items-center justify-center text-center p-8 z-30"
                                >
                                    <h2 className="text-7xl font-black mb-4 text-emerald-400 uppercase italic">Shift Escaped</h2>
                                    <p className="text-zinc-200 mb-8 text-xl">The tether holds. You escape the gas station... for now.</p>
                                    <button onClick={() => startGame(1)} className="px-8 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-full transition-all flex items-center gap-2"><Play className="w-5 h-5" />PLAY AGAIN</button>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>

                    {gameState === 'PLAYING' && (
                        <motion.div 
                            className="absolute bottom-0 right-20 pointer-events-none z-20"
                            animate={{ 
                                y: keysPressed.current['w'] || keysPressed.current['s'] ? [0, 15, 0] : [0, 5, 0],
                                x: keysPressed.current['a'] || keysPressed.current['d'] ? [-10, 10, -10] : [0, 0, 0]
                            }}
                            transition={{ repeat: Infinity, duration: 0.5 }}
                        >
                            <div className="relative w-64 h-64 bg-zinc-900 rounded-t-full border-t-4 border-zinc-800 shadow-2xl">
                                <div className="absolute top-4 left-1/2 -translate-x-1/2 w-12 h-12 bg-zinc-700 rounded-full border-4 border-zinc-600" />
                                <Flashlight className="absolute top-20 left-1/2 -translate-x-1/2 w-16 h-16 text-zinc-500 rotate-45" />
                            </div>
                        </motion.div>
                    )}

                    <div className="absolute bottom-4 left-4 flex gap-8 text-zinc-500 text-[10px] uppercase tracking-widest font-bold z-10 pointer-events-none">
                        <div className="flex items-center gap-2"><span className="p-1 bg-zinc-900 rounded border border-zinc-800">WASD</span><span>Move</span></div>
                        <div className="flex items-center gap-2"><span className="p-1 bg-zinc-900 rounded border border-zinc-800">Mouse</span><span>Look</span></div>
                        <div className="flex items-center gap-2"><span className="p-1 bg-zinc-900 rounded border border-zinc-800">E</span><span>Interact</span></div>
                        <div className="flex items-center gap-2"><span className="p-1 bg-zinc-900 rounded border border-zinc-800">F</span><span>Flashlight</span></div>
                    </div>

                    <div className="crt-overlay" />
                </div>
            );
        }

                console.log("Joe the Game: Rendering App...");
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
                console.log("Joe the Game: Render call complete.");
            } catch (e) {
                console.error("Joe the Game: Initialization error:", e);
                document.getElementById('root').innerHTML = `
                    <div style="color: white; padding: 20px; font-family: sans-serif; text-align: center; background: black; height: 100vh;">
                        <h1 style="color: red;">Error: Initialization Failed</h1>
                        <p>Something went wrong while starting the game.</p>
                        <pre style="text-align: left; background: #222; padding: 10px; overflow: auto; max-height: 300px; font-size: 12px;">${e.stack || e.message}</pre>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
