            const root = document.getElementById('root');
            if (root && (root.innerHTML.includes('LOADING RITUAL') || root.innerHTML === '')) {
                root.innerHTML = `
                    <div style="color: white; padding: 20px; font-family: sans-serif; text-align: center; background: black; height: 100vh;">
                        <h1 style="color: red;">Critical Error</h1>
                        <p>The game failed to start. This might be due to a script loading error or a syntax issue.</p>
                        <div style="text-align: left; background: #222; padding: 10px; overflow: auto; max-height: 300px; font-size: 12px; color: #aaa;">
                            ${msg}<br>at ${url}:${lineNo}:${columnNo}
                        </div>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #444; color: white; border: none; cursor: pointer;">Reload Page</button>
                    </div>
                `;
            }
            return false;
        };

                function App() {

                    y = Math.floor(Math.random() * (MAP_SIZE - 2)) + 1;
                    dist = Math.sqrt((x - playerX)**2 + (y - playerY)**2);

            const startGame = (startLevel = 1) => {

                setLevel(startLevel);
                setBattery(100);
                setFlashlightOn(true);
                setShowMap(false);
                const newMap = config.map.map(row => [...row]);
                setWorldMap(newMap);
                setTasks(config.tasks.map(t => ({ ...t, completed: false })));

                const spawnY = config.spawn?.y || 12.5;

                chat.current = getRandomWalkablePosition(newMap, spawnX, spawnY, 10);
                setSpawnGracePeriod(180); // 3 seconds at ~60fps
                setChatMessages([{ id: Date.now(), user: 'System', text: `Level ${startLevel} Ritual Initiated. Prepare yourself.`, type: 'system' }]);

            const nextLevel = () => {
                if (LEVELS[level + 1]) {

            const handleInteraction = useCallback(() => {
                const checkDist = 1.2;
                const testX = Math.floor(player.current.x + Math.cos(player.current.dir) * checkDist);
                const testY = Math.floor(player.current.y + Math.sin(player.current.dir) * checkDist);

                if (testX >= 0 && testX < MAP_SIZE && testY >= 0 && testY < MAP_SIZE) {
                    setWorldMap(prev => {
                        const tile = prev[testY][testX];
                        if (tile === 4 || tile === 5) {
                            const newMap = [...prev];
                            newMap[testY] = [...prev[testY]];
                            newMap[testY][testX] = tile === 4 ? 5 : 4;
                            return newMap;
                        }
                        return prev;
                    });
                }
            }, []);

            const handleKeyDown = useCallback((e) => {
                const key = e.key.toLowerCase();
                keysPressed.current[key] = true;
                if (key === 'e' && gameState === 'PLAYING') handleInteraction();
                if (key === 'f' && gameState === 'PLAYING') setFlashlightOn(prev => !prev);
                if (key === 'm' && gameState === 'PLAYING') setShowMap(prev => !prev);
            }, [gameState, handleInteraction]);

            const handleKeyUp = useCallback((e) => {
                keysPressed.current[e.key.toLowerCase()] = false;
            }, []);

            const handleMouseMove = useCallback((e) => {
                if (document.pointerLockElement === canvasRef.current) {
                    targetDir.current += e.movementX * MOUSE_SENSITIVITY;

            const requestLock = () => {

            useEffect(() => {

                document.addEventListener('pointerlockchange', lockChange);
                return () => document.removeEventListener('pointerlockchange', lockChange);
            }, []);

            const batteryRef = useRef(battery);
            const tasksRef = useRef(tasks);

            useEffect(() => { batteryRef.current = battery; }, [battery]);
            useEffect(() => { tasksRef.current = tasks; }, [tasks]);

            // Separate effect for chat messages to avoid interval reset on every frame
            useEffect(() => {
                if (gameState !== 'PLAYING') return;
                console.log("Chat interval started");

                const scaryUsers = ['X_Void_X', 'StaticWatcher', 'User_666', 'The_Eye', 'Glitch_Boi', 'Not_Joe', 'Behind_You', 'Lurker', 'Red_Static'];
                const genericMessages = [
                    "I see you.",
                    "Don't look back.",
                    "The battery is dying.",
                    "Joe is hungry.",
                    "Why are you still here?",
                    "It's cold in there.",
                    "Look at the camera.",

                    "Don't let the light die.",
                    "Is that a shadow?",
                    "Run.",
                    "Too slow.",

                ];

                const chatInterval = setInterval(() => {
                    const config = LEVELS[level];
                    if (Math.random() < config.chatSpeed * 15) {
                        const user = scaryUsers[Math.floor(Math.random() * scaryUsers.length)];
                        let text = genericMessages[Math.floor(Math.random() * genericMessages.length)];
                        
                        // Contextual messages using refs
                        if (batteryRef.current < 20) text = "THE LIGHT IS FADING. GOOD.";
                        if (tasksRef.current.filter(t => t.completed).length === tasksRef.current.length - 1) text = "ALMOST DONE. BUT NOT QUITE.";

                        setChatMessages(prev => {
                            const newMessage = {
                                id: Date.now(),

                                type: Math.random() > 0.8 ? 'glitch' : 'normal'

                            return [...prev.slice(-8), newMessage];
                        });
                    }
                }, 1000);

                return () => clearInterval(chatInterval);
            }, [gameState, level]);

            useEffect(() => {
                if (gameState !== 'PLAYING') return;
                
                const glitchTimer = setInterval(() => {
                    if (Math.random() > 0.95) {

                        setTimeout(() => setGlitchActive(false), 100 + Math.random() * 200);
                    }
                    // Fluctuating viewers
                    setViewers(prev => Math.max(1, prev + Math.floor(Math.random() * 21) - 10));
                }, 2000);
                
                return () => clearInterval(glitchTimer);
            }, [gameState]);

            const update = useCallback(() => {
                if (gameState !== 'PLAYING') return;

                const sprinting = keysPressed.current['shift'] && stamina > 0;
                setIsSprinting(sprinting);
                
                const currentSpeed = sprinting ? PLAYER_SPEED * 1.8 : PLAYER_SPEED;
                const currentFOV = sprinting ? FOV * 1.2 : FOV;
                
                if (sprinting) {
                    setStamina(prev => Math.max(0, prev - 0.5));
                } else {
                    setStamina(prev => Math.min(100, prev + 0.3));
                }

                const moveX = Math.cos(player.current.dir) * currentSpeed;
                const moveY = Math.sin(player.current.dir) * currentSpeed;
                const strafeX = Math.cos(player.current.dir + Math.PI / 2) * currentSpeed;
                const strafeY = Math.sin(player.current.dir + Math.PI / 2) * currentSpeed;

                let nextX = player.current.x;
                let nextY = player.current.y;

                if (keysPressed.current['w']) { nextX += moveX; nextY += moveY; }
                if (keysPressed.current['s']) { nextX -= moveX; nextY -= moveY; }
                if (keysPressed.current['a']) { nextX -= strafeX; nextY -= strafeY; }
                if (keysPressed.current['d']) { nextX += strafeX; nextY += strafeY; }

                const isWalkable = (x, y) => {
                    const radius = 0.2;
                    for (let ox = -radius; ox <= radius; ox += radius * 2) {
                        for (let oy = -radius; oy <= radius; oy += radius * 2) {
                            const tx = Math.floor(x + ox);
                            const ty = Math.floor(y + oy);
                            if (tx < 0 || tx >= MAP_SIZE || ty < 0 || ty >= MAP_SIZE) return false;
                            const tile = worldMap[ty][tx];
                            if (tile !== 0 && tile !== 5) return false;
                        }
                    }
                    return true;
                };

                if (isWalkable(nextX, nextY)) {
                    if (nextX !== player.current.x || nextY !== player.current.y) {
                        setBob(prev => prev + (sprinting ? 0.3 : 0.15));
                    }
                    player.current.x = nextX;
                    player.current.y = nextY;
                } else if (isWalkable(nextX, player.current.y)) {
                    if (nextX !== player.current.x) setBob(prev => prev + (sprinting ? 0.3 : 0.15));
                    player.current.x = nextX;
                } else if (isWalkable(player.current.x, nextY)) {
                    if (nextY !== player.current.y) setBob(prev => prev + (sprinting ? 0.3 : 0.15));
                    player.current.y = nextY;
                }

                // Camera lerp
                player.current.dir += (targetDir.current - player.current.dir) * 0.15;

                const checkDist = 1.2;
                const lookX = Math.floor(player.current.x + Math.cos(player.current.dir) * checkDist);
                const lookY = Math.floor(player.current.y + Math.sin(player.current.dir) * checkDist);
                if (lookX >= 0 && lookX < MAP_SIZE && lookY >= 0 && lookY < MAP_SIZE) {
                    const tile = worldMap[lookY][lookX];
                    if (tile === 4) setInteractionPrompt('Open Door [E]');
                    else if (tile === 5) setInteractionPrompt('Close Door [E]');
                    else if (tile === 6) setInteractionPrompt('Charge Flashlight [E]');
                    else setInteractionPrompt(null);
                } else {
                    setInteractionPrompt(null);
                }

                const config = LEVELS[level];

                // Charging Logic
                let nearChargingStation = false;
                if (lookX >= 0 && lookX < MAP_SIZE && lookY >= 0 && lookY < MAP_SIZE) {
                    if (worldMap[lookY][lookX] === 6) nearChargingStation = true;
                }

                if (nearChargingStation && keysPressed.current['e']) {
                    setChargingProgress(prev => {
                        const next = prev + 1;
                        if (next >= 100) {
                            setBattery(b => Math.min(100, b + 20));
                            return 0;
                        }
                        return next;
                    });
                } else {
                    setChargingProgress(0);
                }
                
                if (spawnGracePeriod <= 0) {
                    const dx = player.current.x - chat.current.x;
                    const dy = player.current.y - chat.current.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 0.1) {
                        const nextChatX = chat.current.x + (dx / dist) * config.chatSpeed;
                        const nextChatY = chat.current.y + (dy / dist) * config.chatSpeed;
                        
                        // Simple collision for chat entity
                        if (isWalkable(nextChatX, nextChatY)) {
                            chat.current.x = nextChatX;
                            chat.current.y = nextChatY;
                        } else if (isWalkable(nextChatX, chat.current.y)) {
                            chat.current.x = nextChatX;
                        } else if (isWalkable(chat.current.x, nextChatY)) {
                            chat.current.y = nextChatY;
                        }
                    }

                    if (dist < 0.4) {
                        setGameState('JUMPSCARE');
                        setShowJumpscare(true);
                        if (document.pointerLockElement) document.exitPointerLock();
                        setTimeout(() => {
                            setShowJumpscare(false);
                            setGameState('GAMEOVER');
                        }, 2000);
                    }
                } else {
                    setSpawnGracePeriod(prev => prev - 1);
                }

                let ritualInRange = null;
                tasks.forEach(t => {
                    if (!t.completed) {
                        const tdx = player.current.x - (t.gridX + 0.5);
                        const tdy = player.current.y - (t.gridY + 0.5);
                        const tdist = Math.sqrt(tdx * tdx + tdy * tdy);
                        if (tdist < 0.8) {
                            ritualInRange = t;
                        }
                    }
                });

                if (ritualInRange) {
                    setActiveRitualId(ritualInRange.id);
                    if (keysPressed.current['e']) {
                        setRitualProgress(prev => {
                            const next = prev + 1.5; // Progress speed
                            if (next >= 100) {
                                setTasks(ts => ts.map(t => t.id === ritualInRange.id ? { ...t, completed: true } : t));
                                return 0;
                            }
                            return next;
                        });
                    } else {
                        setRitualProgress(0);
                    }
                } else {
                    setActiveRitualId(null);
                    setRitualProgress(0);
                }

                if (flashlightOn && battery > 0) {
                    setBattery(prev => Math.max(0, prev - config.batteryDrain));
                }

                // Update static intensity based on chat distance
                const cdx = player.current.x - chat.current.x;
                const cdy = player.current.y - chat.current.y;
                const cdist = Math.sqrt(cdx * cdx + cdy * cdy);
                setStaticIntensity(Math.max(0, 1 - cdist / 6));

                if (tasks.every(t => t.completed)) {
                    setGameState('LEVEL_COMPLETE');
                    if (document.pointerLockElement) document.exitPointerLock();
                }
            }, [gameState, tasks, worldMap, flashlightOn, battery, level]);

            const draw = useCallback((ctx, currentFOV = FOV) => {
                const { width, height, dpr } = canvasSize;
                ctx.clearRect(0, 0, width, height);
                ctx.save();
                ctx.scale(dpr, dpr);

                const numRays = width;
                const stepAngle = currentFOV / numRays;
                const zBuffer = new Float32Array(numRays);

                const bobOffset = Math.sin(bob) * 10;
                const chatDist = Math.sqrt((player.current.x - chat.current.x)**2 + (player.current.y - chat.current.y)**2);
                const proximityStatic = Math.max(0, 1 - chatDist / 8);

                for (let i = 0; i < numRays; i++) {
                    const rayAngle = player.current.dir - currentFOV / 2 + i * stepAngle;
                    let distance = 0;
                    let hitWall = false;
                    let wallType = 0;

                    const eyeX = Math.cos(rayAngle);
                    const eyeY = Math.sin(rayAngle);

                    while (!hitWall && distance < 20) {
                        distance += 0.02;
                        const testX = Math.floor(player.current.x + eyeX * distance);
                        const testY = Math.floor(player.current.y + eyeY * distance);

                        if (testX < 0 || testX >= MAP_SIZE || testY < 0 || testY >= MAP_SIZE) {
                            hitWall = true;
                            distance = 20;
                        } else {
                            if (worldMap[testY][testX] > 0 && worldMap[testY][testX] !== 5) {
                                hitWall = true;
                                wallType = worldMap[testY][testX];
                            }
                        }
                    }

                    const correctedDistance = distance * Math.cos(rayAngle - player.current.dir);
                    const wallHeight = height / correctedDistance;
                    const ceiling = height / 2 - wallHeight + bobOffset;
                    const floor = height / 2 + wallHeight + bobOffset;

                    ctx.fillStyle = (battery > 0 && flashlightOn) ? '#050505' : 'black';
                    ctx.fillRect(i, 0, 1, ceiling);

                    let baseColor = [20, 20, 20];
                    if (wallType === 1) baseColor = [60, 30, 30];
                    if (wallType === 2) baseColor = [30, 50, 70];
                    if (wallType === 3) baseColor = [50, 50, 30];
                    if (wallType === 4) baseColor = [50, 50, 50];
                    if (wallType === 6) baseColor = [16, 185, 129]; // Emerald color for charging station

                    const brightness = Math.max(0, 1.2 - correctedDistance / 20);
                    let r = Math.min(255, baseColor[0] * brightness * 1.5);
                    let g = Math.min(255, baseColor[1] * brightness * 1.5);
                    let b = Math.min(255, baseColor[2] * brightness * 1.5);
                    
                    // Add proximity red tint
                    r += proximityStatic * 100;

                    ctx.fillStyle = (battery > 0 && flashlightOn) ? `rgb(${r}, ${g}, ${b})` : 'black';
                    ctx.fillRect(i, ceiling, 1, floor - ceiling);

                    // Wall texture noise
                    if (battery > 0 && flashlightOn && correctedDistance < 10) {
                        ctx.fillStyle = `rgba(0,0,0,${0.1 * (1 - correctedDistance/10)})`;
                        if (Math.random() > 0.5) ctx.fillRect(i, ceiling + Math.random() * (floor-ceiling), 1, 2);
                    }

                    if (wallType === 3 && battery > 0) {
                        ctx.fillStyle = `rgba(0,0,0,${0.3 * brightness})`;
                        for (let j = 0; j < 4; j++) {
                            const shelfY = ceiling + (floor - ceiling) * (j / 4);
                            ctx.fillRect(i, shelfY, 1, 2);
                        }
                    }

                    const floorBrightness = Math.max(0, 1 - (correctedDistance / 12));
                    const fR = (battery > 0 && flashlightOn) ? (10 + proximityStatic * 50) * floorBrightness : 0;
                    const fG = (battery > 0 && flashlightOn) ? 10 * floorBrightness : 0;
                    const fB = (battery > 0 && flashlightOn) ? 10 * floorBrightness : 0;
                    ctx.fillStyle = `rgb(${fR}, ${fG}, ${fB})`;
                    ctx.fillRect(i, floor, 1, height - floor);

                    zBuffer[i] = distance;
                }

                const renderSprite = (x, y, color, size, isChat = false) => {
                    const dx = x - player.current.x;
                    const dy = y - player.current.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    let spriteAngle = Math.atan2(dy, dx) - player.current.dir;
                    if (spriteAngle < -Math.PI) spriteAngle += 2 * Math.PI;
                    if (spriteAngle > Math.PI) spriteAngle -= 2 * Math.PI;

                    if (Math.abs(spriteAngle) < currentFOV / 2) {
                        const screenX = (spriteAngle + currentFOV / 2) / currentFOV * width;
                        const spriteHeight = height / dist * size;
                        const spriteWidth = spriteHeight;
                        
                        const screenY = height / 2 - spriteHeight / 2 + bobOffset;

                        // Z-Buffer check: only render if sprite is closer than the wall at this screen column
                        const ix = Math.floor(screenX);
                        const leftIx = Math.floor(screenX - spriteWidth / 4);
                        const rightIx = Math.floor(screenX + spriteWidth / 4);
                        
                        let visible = false;
                        if (ix >= 0 && ix < width && zBuffer[ix] > dist) visible = true;
                        else if (leftIx >= 0 && leftIx < width && zBuffer[leftIx] > dist) visible = true;
                        else if (rightIx >= 0 && rightIx < width && zBuffer[rightIx] > dist) visible = true;
                        
                        if (!visible) return;

                        if (battery > 0 && flashlightOn) {
                            const brightness = Math.max(0, 1.2 - dist / 20);
                            ctx.globalAlpha = Math.min(1, brightness * 1.5);
                            ctx.fillStyle = color;
                            ctx.fillRect(screenX - spriteWidth / 2, screenY, spriteWidth, spriteHeight);
                            
                            if (isChat) {
                                const xPos = screenX;
                                const yPos = screenY + spriteHeight / 2;
                                const time = Date.now() / 1000;

                                // Tall, spindly shadowy body
                                ctx.save();
                                ctx.globalAlpha = Math.min(1, brightness * 2);
                                
                                // Main torso (tall and thin)
                                ctx.fillStyle = '#000000';
                                const torsoWidth = spriteWidth * 0.4;
                                const torsoHeight = spriteHeight * 2.5;
                                ctx.fillRect(xPos - torsoWidth / 2, yPos - torsoHeight / 2, torsoWidth, torsoHeight);
                                
                                // Static noise inside body
                                for(let j=0; j<30; j++) {
                                    ctx.fillStyle = Math.random() > 0.5 ? '#220000' : '#000000';
                                    ctx.fillRect(
                                        xPos - torsoWidth/2 + Math.random() * torsoWidth,
                                        yPos - torsoHeight/2 + Math.random() * torsoHeight,
                                        Math.random() * 3,
                                        Math.random() * 3
                                    );
                                }

                                // Twitching spindly limbs
                                ctx.strokeStyle = '#000000';
                                ctx.lineWidth = 3;
                                const limbCount = 4;
                                for(let j=0; j<limbCount; j++) {
                                    const side = j < 2 ? -1 : 1;
                                    const limbY = yPos - torsoHeight/4 + (j % 2) * (torsoHeight/2);
                                    
                                    ctx.beginPath();
                                    ctx.moveTo(xPos + (side * torsoWidth/2), limbY);
                                    
                                    // Elbow/Joint with twitch
                                    const twitchX = Math.sin(time * 20 + j) * 10;
                                    const twitchY = Math.cos(time * 15 + j) * 10;
                                    const elbowX = xPos + (side * spriteWidth * 0.8) + twitchX;
                                    const elbowY = limbY - (spriteHeight * 0.3) + twitchY;
                                    
                                    ctx.lineTo(elbowX, elbowY);
                                    
                                    // Hand/End of limb
                                    const handX = elbowX + (side * spriteWidth * 0.4) + Math.sin(time * 25) * 5;
                                    const handY = elbowY + (spriteHeight * 0.5) + Math.cos(time * 30) * 5;
                                    ctx.lineTo(handX, handY);
                                    ctx.stroke();
                                }

                                // Head area glow
                                const headY = yPos - torsoHeight/2;
                                const headGlow = ctx.createRadialGradient(xPos, headY, 0, xPos, headY, spriteWidth * 0.5);
                                headGlow.addColorStop(0, 'rgba(255, 0, 0, 0.3)');
                                headGlow.addColorStop(1, 'transparent');
                                ctx.fillStyle = headGlow;
                                ctx.beginPath();
                                ctx.arc(xPos, headY, spriteWidth * 0.5, 0, Math.PI * 2);
                                ctx.fill();

                                ctx.restore();
                            } else {
                                ctx.fillStyle = color;
                                ctx.fillRect(screenX - spriteWidth / 2, screenY, spriteWidth, spriteHeight);
                            }
                            ctx.globalAlpha = 1;
                        }

                        // Eyes and whispers are visible even in dark if close enough
                        if (isChat) {
                            const time = Date.now() / 1000;
                            const xPos = screenX;
                            const yPos = screenY + spriteHeight / 2;
                            const glowAlpha = Math.max(0, 1 - dist / 12);
                            const torsoHeight = spriteHeight * 2.5;

                            if (glowAlpha > 0) {
                                ctx.save();
                                ctx.globalAlpha = glowAlpha;
                                
                                // Many random eyes clustered near the "head"
                                const headY = yPos - torsoHeight/2;
                                const eyeCount = 12 + Math.floor(Math.sin(time * 2) * 6 + 6);
                                for (let j = 0; j < eyeCount; j++) {
                                    const offsetX = (Math.sin(time * (j + 1)) * 0.3) * spriteWidth;
                                    const offsetY = (Math.cos(time * (j + 1.5)) * 0.3) * spriteWidth;
                                    const eyeSize = (0.04 + Math.random() * 0.08) * spriteWidth;
                                    
                                    // Pulsing glow
                                    const pulse = 0.8 + Math.sin(time * 5 + j) * 0.2;
                                    
                                    ctx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
                                    ctx.beginPath();
                                    ctx.ellipse(xPos + offsetX, headY + offsetY, eyeSize, eyeSize * 0.6, 0, 0, Math.PI * 2);
                                    ctx.fill();
                                    
                                    ctx.fillStyle = `rgba(255, 0, 0, ${pulse})`;
                                    ctx.beginPath();
                                    ctx.arc(xPos + offsetX + (Math.random()-0.5)*2, headY + offsetY + (Math.random()-0.5)*2, eyeSize * 0.4, 0, Math.PI * 2);
                                    ctx.fill();
                                }

                                // Floating whispers
                                if (dist < 5) {
                                    const whispers = ["I SEE YOU", "HUNGRY", "JOE IS HERE", "VOID CALLS", "DIE", "STAY FOREVER", "THEY ARE WATCHING", "NO ESCAPE"];
                                    ctx.font = 'bold 14px monospace';
                                    ctx.fillStyle = 'rgba(255, 0, 0, 1)';
                                    const whisper = whispers[Math.floor((time * 2) % whispers.length)];
                                    ctx.fillText(whisper, xPos - 50 + Math.sin(time*10)*15, headY - 40 + Math.cos(time*5)*10);
                                }

                                // Occasional big red flash
                                if (Math.random() > 0.97) {
                                    ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
                                    ctx.fillRect(0, 0, width, height);
                                }
                                ctx.restore();
                            }
                        }
                    }
                };

                tasks.forEach(t => {
                    if (!t.completed) renderSprite(t.gridX + 0.5, t.gridY + 0.5, '#facc15', 0.3);
                });
                renderSprite(chat.current.x, chat.current.y, '#ef4444', 0.8, true);

                // Post-processing: Vignette
                const vignette = ctx.createRadialGradient(width/2, height/2, width/4, width/2, height/2, width);
                vignette.addColorStop(0, 'transparent');
                vignette.addColorStop(1, 'rgba(0,0,0,0.9)');
                ctx.fillStyle = vignette;
                ctx.fillRect(0, 0, width, height);

                // Flashlight Spotlight Effect
                if (flashlightOn && battery > 0) {
                    ctx.save();
                    const spotlight = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width/3);
                    spotlight.addColorStop(0, 'transparent');
                    spotlight.addColorStop(0.4, 'rgba(0,0,0,0.1)');
                    spotlight.addColorStop(1, 'rgba(0,0,0,0.95)');
                    ctx.fillStyle = spotlight;
                    ctx.fillRect(0, 0, width, height);
                    ctx.restore();
                } else {
                    // Pitch black if flashlight is off
                    ctx.fillStyle = 'rgba(0,0,0,0.98)';
                    ctx.fillRect(0, 0, width, height);
                }

                // Post-processing: Scanlines
                ctx.fillStyle = 'rgba(18, 16, 16, 0.1)';
                for (let i = 0; i < height; i += 4) {
                    ctx.fillRect(0, i, width, 1);
                }

                // Draw static noise as overlay
                if (staticIntensity > 0.1) {
                    ctx.save();
                    ctx.globalAlpha = staticIntensity * 0.4;
                    for (let i = 0; i < 500; i++) {
                        const x = Math.random() * width;
                        const y = Math.random() * height;
                        const s = Math.random() * 2;
                        ctx.fillStyle = Math.random() > 0.5 ? 'white' : 'black';
                        ctx.fillRect(x, y, s, s);
                    }
                    ctx.restore();
                }

                // Proximity pulse (Heartbeat effect)
                if (staticIntensity > 0.5) {
                    const time = Date.now() / 1000;
                    const pulse = Math.sin(time * 10) * 0.5 + 0.5;
                    ctx.save();
                    ctx.globalAlpha = (staticIntensity - 0.5) * 0.4 * pulse;
                    ctx.fillStyle = '#450a0a';
                    ctx.fillRect(0, 0, width, height);
                    ctx.restore();
                    
                    // Screen shake
                    if (staticIntensity > 0.8) {
                        const shakeX = (Math.random() - 0.5) * 20 * (staticIntensity - 0.8);
                        const shakeY = (Math.random() - 0.5) * 20 * (staticIntensity - 0.8);
                        ctx.translate(shakeX, shakeY);
                    }
                }
                ctx.restore();
            }, [tasks, battery, worldMap, flashlightOn, canvasSize, staticIntensity, bob]);

            useEffect(() => {
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                window.addEventListener('mousemove', handleMouseMove);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);

                    window.removeEventListener('mousemove', handleMouseMove);

                                        <motion.div

                                        }}
                                        transition={{ repeat: Infinity, duration: 0.05 }}
                                        className="mt-12 text-2xl md:text-5xl font-black uppercase tracking-tighter italic drop-shadow-[0_0_30px_rgba(255,0,0,1)]"
                                    >
                                        VOID CONSUMED YOU
                                    </motion.div>
                                </motion.div>
                            )}

                            {gameState === 'GAMEOVER' && (
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                    className="absolute inset-0 bg-black/95 flex flex-col items-center justify-center text-center p-8 z-30"
                                >
                                    <h2 className="text-lg md:text-xl font-black mb-3 text-red-600 uppercase">Shift Terminated</h2>
                                    <p className="text-zinc-400 mb-6 text-xs md:text-sm">You are now part of the stream. Forever.</p>
                                    <button onClick={() => startGame(1)} className="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-full transition-all flex items-center gap-1.5 text-xs"><RefreshCw className="w-3.5 h-3.5" />RETRY RITUAL</button>
                                </motion.div>
                            )}

                            {gameState === 'WIN' && (
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                    className="absolute inset-0 bg-emerald-950/90 flex flex-col items-center justify-center text-center p-8 z-30"
                                >
                                    <h2 className="text-4xl md:text-7xl font-black mb-4 text-emerald-400 uppercase italic">Shift Escaped</h2>
                                    <p className="text-zinc-200 mb-6 text-sm md:text-base">The tether holds. You escape the gas station... for now.</p>
                                    <button onClick={() => startGame(1)} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-full transition-all flex items-center gap-1.5 text-xs"><Play className="w-3.5 h-3.5" />PLAY AGAIN</button>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>

                    {gameState === 'PLAYING' && (
                        <motion.div 
                            className="absolute bottom-0 right-20 pointer-events-none z-20"
                            animate={{ 
                                y: keysPressed.current['w'] || keysPressed.current['s'] ? [0, 15, 0] : [0, 5, 0],
                                x: keysPressed.current['a'] || keysPressed.current['d'] ? [-10, 10, -10] : [0, 0, 0]
                            }}
                            transition={{ repeat: Infinity, duration: 0.5 }}
                        >
                            <div className="relative w-64 h-64 bg-zinc-900 rounded-t-full border-t-4 border-zinc-800 shadow-2xl">
                                <div className="absolute top-4 left-1/2 -translate-x-1/2 w-12 h-12 bg-zinc-700 rounded-full border-4 border-zinc-600" />
                                <Flashlight className="absolute top-20 left-1/2 -translate-x-1/2 w-16 h-16 text-zinc-500 rotate-45" />
                            </div>
                        </motion.div>
                    )}

                    <div className="absolute bottom-4 left-4 flex gap-8 text-zinc-500 text-[10px] uppercase tracking-widest font-bold z-10 pointer-events-none">
                        <div className="flex items-center gap-2"><span className="p-1 bg-zinc-900 rounded border border-zinc-800">WASD</span><span>Move</span></div>
                        <div className="flex items-center gap-2"><span className="p-1 bg-zinc-900 rounded border border-zinc-800">Mouse</span><span>Look</span></div>
                        <div className="flex items-center gap-2"><span className="p-1 bg-zinc-900 rounded border border-zinc-800">E</span><span>Interact</span></div>
                        <div className="flex items-center gap-2"><span className="p-1 bg-zinc-900 rounded border border-zinc-800">F</span><span>Flashlight</span></div>
                        <div className="flex items-center gap-2"><span className="p-1 bg-zinc-900 rounded border border-zinc-800">M</span><span>Map</span></div>
                    </div>

                    <div className="crt-overlay" />
                </div>
            );
        }

                console.log("Joe the Game: Rendering App...");
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
                console.log("Joe the Game: Render call complete.");
            } catch (e) {
                console.error("Joe the Game: Initialization error:", e);
                document.getElementById('root').innerHTML = `
                    <div style="color: white; padding: 20px; font-family: sans-serif; text-align: center; background: black; height: 100vh;">
                        <h1 style="color: red;">Error: Initialization Failed</h1>
                        <p>Something went wrong while starting the game.</p>
                        <pre style="text-align: left; background: #222; padding: 10px; overflow: auto; max-height: 300px; font-size: 12px;">${e.stack || e.message}</pre>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
